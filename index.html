<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket API</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#446b78,#7c3aed);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    text-align:center;
    background:rgba(255, 255, 255, 0.1);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:20px;
    width:90%;
    max-width:700px;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

h1{
    font-size:3rem;
    margin-bottom:15px;
}

p{
    font-size:1.1rem;
    margin-bottom:30px;
    opacity:0.9;
}

.btn{
    display:inline-block;
    padding:12px 25px;
    background:white;
    color:#4f46e5;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-3px);
    background:#f3f4f6;
}

.cards{
    margin-top:35px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

.card{
    background:rgba(255, 255, 255, 0.15);
    padding:20px;
    border-radius:15px;
}

.card h3{
    margin-bottom:10px;
}

footer{
    margin-top:30px;
    opacity:0.8;
    font-size:14px;
}
</style>

</head>
<body>

<div class="container">

    <h1> Ticket API</h1>

    <p>
        API REST développée avec Node.js et Express
        pour gérer les tickets facilement.
    </p>

    <a href="/api/tickets" class="btn">
        Voir les Tickets
    </a>

    <div class="cards">

        <div class="card">
            <h3> GET</h3>
            <p>Afficher tous les tickets</p>
        </div>

        <div class="card">
            <h3>POST</h3>
            <p>Ajouter un nouveau ticket</p>
        </div>

        <div class="card">
            <h3> PUT</h3>
            <p>Modifier un ticket</p>
        </div>

        <div class="card">
            <h3> DELETE</h3>
            <p>Supprimer un ticket</p>
        </div>

    </div>

    <footer>
        Ticket API © 2026 | Express.js REST API
    </footer>

</div>

</body>
</html>
